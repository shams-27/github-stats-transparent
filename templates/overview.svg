<svg width="480" height="280" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  line-height: 21px;
}

#background {
  width: 100%;
  height: 100%;
  fill: #00000000;
  rx: 6px;
  ry: 6px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 28px);
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
}

th {
  padding: 0.1em;
  padding-top: 0;
  padding-bottom: 0.3em;
  text-align: left;
  font-size: 25px;
  font-weight: 600;
  color: #4ade80;
}

td {
  margin-bottom: 16px;
  margin-top: 8px;
  padding: 0.25em;
  font-size: 16px;
  line-height: 18px;
  color: #FDFD96;
}

tr {
  transform: translateY(500%);
  animation-duration: 1s;
  animation-name: slideIn;
  animation-function: ease-in-out;
  animation-fill-mode: forwards;
}

.label {
  font-weight: 600;
  color: #89b4c1;
}
.octicon {
  fill: #89b4c1;
  margin-right: 1ch;
  vertical-align: top;
}

@keyframes slideIn {
  to {
    transform: translateY(0);
  }
}
</style>
<g>
<rect x="5" y="5" id="background" />
<g>
<foreignObject x="21" y="19" width="439" height="242">
<div xmlns="http://www.w3.org/1999/xhtml">

<table>
